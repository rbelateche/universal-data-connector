name: CI

on:
  push:
    branches: [main, project-setup]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd backend && uv pip install --system -e ".[dev]"

      - name: Run ruff check
        run: cd backend && uv run ruff check src/

      - name: Run ruff format check
        run: cd backend && uv run ruff format --check src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd backend && uv pip install --system -e ".[dev]"

      - name: Run mypy
        run: cd backend && uv run mypy src/udc

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: udc
          POSTGRES_PASSWORD: udc_secret
          POSTGRES_DB: udc_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd backend && uv pip install --system -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://udc:udc_secret@localhost:5432/udc_demo
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key' }}
          DUCKDB_PATH: ./data/test.duckdb
          API_KEY: test-secret
        run: cd backend && uv run pytest ../tests/ -v --tb=short --cov=src/udc --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true
